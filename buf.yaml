version: v2
modules:
  - path: sdk/services/s3minio/proto
    lint:
      use:
        - STANDARD
      except:
        # Internal parity proto: package/dir layout and per-RPC DTO names differ from Buf STYLE defaults.
        - PACKAGE_DIRECTORY_MATCH
        - PACKAGE_VERSION_SUFFIX
        - RPC_REQUEST_RESPONSE_UNIQUE
        - RPC_REQUEST_STANDARD_NAME
        - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
