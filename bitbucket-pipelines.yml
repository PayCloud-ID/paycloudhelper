# Bitbucket Pipelines — paycloudhelper
# Runs build, vet, and unit tests on every push to develop and main.
# Go version must match go.mod / toolchain (e.g. 1.25).

image: golang:1.25-bookworm

definitions:
  caches:
    gomod: go/pkg/mod

  steps:
    - step: &validate
        name: Build, vet & test
        caches:
          - gomod
        script:
          - go version
          - go install github.com/bufbuild/buf/cmd/buf@v1.50.0
          - export PATH="$PATH:$(go env GOPATH)/bin"
          - buf lint
          - make ci.check.direct-http
          - make ci.check.stub-drift
          - go build ./...
          - go vet ./...
          - go test ./...
          - make test-coverage-check COVERAGE_MIN=65

pipelines:
  branches:
    develop:
      - step: *validate
    main:
      - step: *validate
      - step:
          name: Delete merged branches
          script:
            - git fetch origin '+refs/heads/*:refs/remotes/origin/*'
            - |
              for branch in $(git branch -r --merged origin/main | grep -v 'HEAD' | grep -v -E 'origin/(main|develop|staging)$' | sed 's/ *origin\///'); do
                if [ -n "$branch" ]; then
                  echo "Deleting merged branch: $branch"
                  git push origin --delete "$branch" || echo "Failed to delete $branch"
                fi
              done

  # Optional: run the same checks on any other branch (e.g. feature branches)
  default:
    - step: *validate
