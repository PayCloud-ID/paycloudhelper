name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
      - staging
  pull_request:
    branches:
      - master
      - main
      - develop
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, vet & test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.50.0

      - name: Buf lint
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          buf lint

      - name: Check direct HTTP
        run: make ci.check.direct-http

      - name: Check stub drift
        run: make ci.check.stub-drift

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Test Coverage Check
        run: make test-coverage-check || echo "Not implemented"

      - name: GolangCI Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1

      - name: Go Vulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./... || true

  extended-checks:
    name: Extended Checks (Whole Repo Coverage & Build/Deploy)
    runs-on: ubuntu-24.04
    needs: validate
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && (github.base_ref == 'master' || github.base_ref == 'main'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Test Whole Repo Coverage Check
        run: make test-coverage-whole-repo-check || echo "Not implemented"

  cleanup-merged-branches:
    name: Delete branches already merged into master
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Delete branches already merged
        run: |
          if [ $(git rev-list --count --merges HEAD^..HEAD) -eq 0 ]; then
            echo "Not a merge commit. Skipping branch cleanup."
            exit 0
          fi
          echo "Merge commit detected. Proceeding with branch cleanup."
          
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          echo "=== Dynamic Merged Branch Cleanup ==="
          
          echo "Fetching complete git history..."
          git fetch --unshallow origin 2>/dev/null || echo "Repository already unshallow"
          git fetch origin --prune
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          
          echo "Current remote branches:"
          git ls-remote --heads origin | awk '{print $2}' | sed 's|refs/heads/||' | sort
          echo ""
          
          PROTECTED_BRANCHES="master main dev develop staging"
          echo "Protected branches: $PROTECTED_BRANCHES"
          echo ""
          
          echo "=== Finding Merged Branches ==="
          > branches_to_delete.txt
          
          git for-each-ref --format='%(refname:short)' refs/remotes/origin | \
            grep -v 'origin/HEAD' | \
            sed 's|origin/||' | \
            while read branch; do
              [ "$branch" = "master" ] || [ "$branch" = "main" ] && continue
              
              if git show-ref --verify --quiet refs/remotes/origin/$branch; then
                if git merge-base --is-ancestor origin/$branch HEAD 2>/dev/null; then
                  is_protected=false
                  for protected in $PROTECTED_BRANCHES; do
                    if [ "$branch" = "$protected" ]; then
                      echo "PROTECTED: $branch (skipping)"
                      is_protected=true
                      break
                    fi
                  done
                  
                  if [ "$is_protected" = "false" ]; then
                    echo "MERGED: $branch (will delete)"
                    echo "$branch" >> branches_to_delete.txt
                  fi
                else
                  echo "NOT MERGED: $branch (keeping)"
                fi
              fi
            done
          
          echo ""
          echo "=== Deletion Summary ==="
          
          if [ -s branches_to_delete.txt ]; then
            echo "Branches to delete:"
            cat branches_to_delete.txt
            echo ""
            
            deleted=0
            failed=0
            
            while IFS= read -r branch; do
              if [ -n "$branch" ]; then
                echo "Deleting: $branch"
                if git push origin --delete "$branch" 2>/dev/null; then
                  echo "  ✅ Deleted: $branch"
                  deleted=$((deleted + 1))
                else
                  echo "  ❌ Failed: $branch"
                  failed=$((failed + 1))
                fi
              fi
            done < branches_to_delete.txt
            
            echo ""
            echo "Results: $deleted deleted, $failed failed"
          else
            echo "No merged branches to delete"
          fi
          
          echo ""
          echo "Remaining branches:"
          git ls-remote --heads origin | awk '{print $2}' | sed 's|refs/heads/||' | sort
