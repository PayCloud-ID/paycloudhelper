name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate:
    name: Build, vet & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.50.0

      - name: Buf lint
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          buf lint

      - name: Check direct HTTP
        run: make ci.check.direct-http

      - name: Check stub drift
        run: make ci.check.stub-drift

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Coverage check
        run: make test-coverage-check COVERAGE_MIN=65
